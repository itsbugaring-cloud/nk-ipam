services:
  netking-ipam:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netking-ipam
    ports:
      - "8080:8080"
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-sqlite://data/netking.db}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      APP_SESSION_TOKEN: ${APP_SESSION_TOKEN}
      APP_CRYPTO_KEY: ${APP_CRYPTO_KEY}
      MIKROTIK_USERNAME: ${MIKROTIK_USERNAME:-}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD:-}
      MIKROTIK_ALLOW_INSECURE_TLS: ${MIKROTIK_ALLOW_INSECURE_TLS:-true}
      MIKROTIK_REQUEST_TIMEOUT_SECS: ${MIKROTIK_REQUEST_TIMEOUT_SECS:-20}
      MAX_SCAN_CONCURRENCY: ${MAX_SCAN_CONCURRENCY:-8}
      SCAN_COOLDOWN_SECS: ${SCAN_COOLDOWN_SECS:-20}
    volumes:
      - netking-ipam-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  netking-ipam-data:
