name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release
